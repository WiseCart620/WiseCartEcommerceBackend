spring:
  datasource:
    url: jdbc:mysql://localhost:3306/wisecart_dev?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: wisecart
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: dev-email@gmail.com
    password: dev-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration: 86400000
    refresh-expiration: 604800000
  
  file:
    upload-dir: ./uploads-dev
    max-image-size: 5242880
    max-document-size: 10485760

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    com.wisecartecommerce: DEBUG
    org.hibernate.SQL: DEBUG