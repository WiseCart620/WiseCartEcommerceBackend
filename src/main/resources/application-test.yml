spring:
  # Use MySQL database for testing
  datasource:
    url: jdbc:mysql://localhost:3306/wisecart_test
    username: root
    password: wisecart
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  
  # Flyway - Enabled for tests with migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: false
    clean-on-validation-error: true
  
  mail:
    host: localhost
    port: 3025
    username: test
    password: test

app:
  jwt:
    secret: test-secret-key-for-unit-tests-only
    expiration: 86400000
  
  file:
    upload-dir: ./build/uploads-test

logging:
  level:
    com.ecommerce: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.flywaydb: DEBUG