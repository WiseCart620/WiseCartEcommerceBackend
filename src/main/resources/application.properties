spring.application.name=ecommerce

# Enable detailed security logging
logging.level.org.springframework.security=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.com.wisecartecommerce.ecommerce.config=DEBUG

# Active profile
spring.profiles.active=dev

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/wisecart_dev?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=wisecart
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=false

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=dev-email@gmail.com
spring.mail.password=dev-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# File Upload Directory
app.file.upload-dir=./uploads-dev
app.file.max-image-size=5242880
app.file.max-document-size=10485760

# Server
server.port=8080
server.servlet.context-path=/

# Logging
logging.level.com.wisecartecommerce=DEBUG
logging.level.org.hibernate.SQL=DEBUG

spring.web.resources.add-mappings=false

# ========== FLASH EXPRESS CONFIGURATION ==========
# Replace these with your actual Flash Express credentials
flash.express.mch-id=YOUR_ACTUAL_MERCHANT_ID_HERE
flash.express.secret-key=YOUR_ACTUAL_SECRET_KEY_HERE
flash.express.warehouse-no=YOUR_WAREHOUSE_NO_HERE
flash.express.src-province-name=Metro Manila
flash.express.src-city-name=Taguig City
flash.express.src-postal-code=1634
flash.express.base-url=https://open-api.flashexpress.ph
# For sandbox testing, uncomment the line below:
# flash.express.base-url=https://open-api-tra.flashexpress.ph